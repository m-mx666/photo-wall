<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我们的照片墙</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Noto+Serif+SC:wght@300;400;500&family=Caveat:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --cream: #f5f0e8;
      --warm-white: #faf8f5;
      --amber: #c9a56a;
      --amber-light: #e8d5a8;
      --brown: #5c4a3d;
      --brown-light: #8b7355;
      --sepia: #d4c4a8;
      --shadow: rgba(92, 74, 61, 0.15);
      --shadow-dark: rgba(92, 74, 61, 0.3);
    }

    body {
      font-family: 'Noto Serif SC', 'Source Serif', Georgia, serif;
      background: var(--cream);
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    /* 胶片颗粒纹理 */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      opacity: 0.04;
      pointer-events: none;
      z-index: 9999;
    }

    /* 暖色漏光效果 */
    .light-leak {
      position: fixed;
      width: 40vw;
      height: 40vw;
      background: radial-gradient(ellipse at center, rgba(201, 165, 106, 0.15) 0%, transparent 60%);
      top: -10vw;
      right: -10vw;
      pointer-events: none;
      z-index: 0;
      animation: leakFloat 20s ease-in-out infinite;
    }

    .light-leak-2 {
      position: fixed;
      width: 30vw;
      height: 30vw;
      background: radial-gradient(ellipse at center, rgba(232, 213, 168, 0.12) 0%, transparent 60%);
      bottom: -5vw;
      left: -5vw;
      pointer-events: none;
      z-index: 0;
      animation: leakFloat 25s ease-in-out infinite reverse;
    }

    @keyframes leakFloat {
      0%, 100% { transform: translate(0, 0) rotate(0deg); }
      33% { transform: translate(2vw, 1vw) rotate(2deg); }
      66% { transform: translate(-1vw, 2vw) rotate(-1deg); }
    }

    /* 唱片机音乐控制 */
    .music-control {
      position: fixed;
      bottom: 30px;
      right: 30px;
      width: 70px;
      height: 70px;
      background: var(--brown);
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      z-index: 100;
      box-shadow: 0 8px 30px var(--shadow-dark);
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .music-control:hover {
      transform: scale(1.08);
      box-shadow: 0 12px 40px var(--shadow-dark);
    }

    .vinyl {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: linear-gradient(145deg, #1a1a1a 0%, #2d2d2d 50%, #1a1a1a 100%);
      position: relative;
      transition: all 0.4s;
    }

    .vinyl::before {
      content: '';
      position: absolute;
      inset: 8px;
      border-radius: 50%;
      background: repeating-radial-gradient(circle at center, transparent 0, transparent 2px, rgba(255,255,255,0.03) 2px, rgba(255,255,255,0.03) 3px);
    }

    .vinyl::after {
      content: '';
      position: absolute;
      inset: 18px;
      border-radius: 50%;
      background: var(--amber);
    }

    .music-control.playing .vinyl {
      animation: spin 3s linear infinite;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .music-label {
      position: absolute;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--amber), var(--amber-light));
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    /* 胶片孔洞装饰条 */
    .film-strip {
      position: fixed;
      top: 0;
      bottom: 0;
      width: 28px;
      background: #2a2218;
      z-index: 0;
      display: flex;
      flex-direction: column;
      justify-content: space-around;
      padding: 10px 0;
    }

    .film-strip.left { left: 0; }
    .film-strip.right { right: 0; }

    .film-hole {
      width: 14px;
      height: 10px;
      background: #1a1510;
      border-radius: 2px;
      margin: 0 auto;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 1100px;
      margin: 0 auto;
      padding: 50px 40px;
    }

    /* 标题区 */
    .header {
      text-align: center;
      padding: 30px 0 60px;
      position: relative;
    }

    .header::before,
    .header::after {
      content: '✦';
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      color: var(--amber);
      font-size: 1.2rem;
      opacity: 0.6;
    }

    .header::before { left: 10%; }
    .header::after { right: 10%; }

    .header h1 {
      font-family: 'Playfair Display', 'Noto Serif SC', serif;
      font-size: 3.2rem;
      font-weight: 500;
      color: var(--brown);
      letter-spacing: 6px;
      margin-bottom: 16px;
      position: relative;
      display: inline-block;
    }

    .header h1::after {
      content: '';
      position: absolute;
      bottom: -8px;
      left: 50%;
      transform: translateX(-50%);
      width: 60px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--amber), transparent);
    }

    .header p {
      font-family: 'Caveat', cursive;
      font-size: 1.4rem;
      color: var(--brown-light);
      letter-spacing: 1px;
    }

    /* 轮播区域 - 幻灯片风格 */
    .carousel-section {
      background: var(--warm-white);
      border-radius: 4px;
      padding: 30px 40px 40px;
      margin-bottom: 60px;
      box-shadow: 0 20px 60px var(--shadow);
      position: relative;
      overflow: hidden;
    }

    /* 投影幕边框 */
    .carousel-section::before {
      content: '';
      position: absolute;
      inset: 8px;
      border: 1px solid var(--amber-light);
      border-radius: 2px;
      pointer-events: none;
    }

    .section-label {
      font-family: 'Caveat', cursive;
      font-size: 1.1rem;
      color: var(--amber);
      text-align: center;
      margin-bottom: 20px;
      letter-spacing: 2px;
    }

    .carousel {
      position: relative;
      width: 100%;
      height: 420px;
      perspective: 1200px;
    }

    .carousel-track {
      position: relative;
      width: 100%;
      height: 100%;
      transform-style: preserve-3d;
    }

    .carousel-item {
      position: absolute;
      width: 300px;
      height: 380px;
      left: 50%;
      top: 50%;
      margin-left: -150px;
      margin-top: -190px;
      cursor: pointer;
      opacity: 0;
      transform: scale(0.7) translateZ(-300px);
      transition: all 0.7s cubic-bezier(0.4, 0, 0.2, 1);
      /* 幻灯片边框 */
      background: var(--warm-white);
      padding: 12px 12px 50px 12px;
      box-shadow: 0 15px 40px var(--shadow-dark);
    }

    .carousel-item::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(201,165,106,0.1) 0%, transparent 50%);
      pointer-events: none;
    }

    .carousel-item.active {
      opacity: 1;
      transform: scale(1) translateZ(0);
      z-index: 10;
    }

    .carousel-item.prev {
      opacity: 0.5;
      transform: scale(0.75) translateX(-200px) translateZ(-200px) rotateY(12deg);
      z-index: 5;
    }

    .carousel-item.next {
      opacity: 0.5;
      transform: scale(0.75) translateX(200px) translateZ(-200px) rotateY(-12deg);
      z-index: 5;
    }

    .carousel-item img {
      width: 100%;
      height: calc(100% - 30px);
      object-fit: cover;
      display: block;
    }

    .carousel-item .slide-date {
      position: absolute;
      bottom: 12px;
      left: 0;
      right: 0;
      text-align: center;
      font-family: 'Caveat', cursive;
      font-size: 1rem;
      color: var(--brown-light);
    }

    .carousel-dots {
      display: flex;
      justify-content: center;
      gap: 14px;
      margin-top: 20px;
    }

    .carousel-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--sepia);
      cursor: pointer;
      transition: all 0.3s;
      border: none;
    }

    .carousel-dot.active {
      background: var(--amber);
      width: 24px;
      border-radius: 4px;
    }

    /* 照片网格 - Polaroid风格 */
    .photo-section h2 {
      text-align: center;
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      font-weight: 400;
      color: var(--brown);
      margin-bottom: 40px;
      letter-spacing: 4px;
    }

    .photo-section h2::before,
    .photo-section h2::after {
      content: '—';
      margin: 0 16px;
      color: var(--amber);
    }

    .sort-control {
      text-align: center;
      margin-bottom: 35px;
    }

    .sort-btn {
      padding: 10px 22px;
      border: 1px solid var(--sepia);
      background: transparent;
      border-radius: 2px;
      cursor: pointer;
      font-family: 'Noto Serif SC', serif;
      font-size: 0.85rem;
      color: var(--brown-light);
      transition: all 0.3s;
      margin: 0 6px;
    }

    .sort-btn:hover {
      border-color: var(--amber);
      color: var(--brown);
    }

    .sort-btn.active {
      background: var(--brown);
      border-color: var(--brown);
      color: var(--cream);
    }

    .add-btn {
      background: var(--amber) !important;
      border-color: var(--amber) !important;
      color: white !important;
      font-weight: 500;
    }

    .add-btn:hover {
      background: var(--brown) !important;
      border-color: var(--brown) !important;
    }

    .photo-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 35px;
    }

    .photo-card {
      position: relative;
      background: var(--warm-white);
      padding: 12px 12px 45px 12px;
      cursor: pointer;
      transform-style: preserve-3d;
      transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 8px 25px var(--shadow);
      animation: polaroidFloat 5s ease-in-out infinite;
    }

    .photo-card:nth-child(odd) { animation-delay: -1.5s; }
    .photo-card:nth-child(even) { animation-delay: -3s; }

    @keyframes polaroidFloat {
      0%, 100% { transform: translateY(0) rotate(-1deg); }
      50% { transform: translateY(-6px) rotate(1deg); }
    }

    .photo-card:hover {
      transform: translateY(-10px) scale(1.02) rotate(0deg);
      box-shadow: 0 20px 45px var(--shadow-dark);
      z-index: 10;
    }

    .photo-card img {
      width: 100%;
      aspect-ratio: 4/5;
      object-fit: cover;
      display: block;
      transition: transform 0.5s;
    }

    .photo-card:hover img {
      transform: scale(1.03);
    }

    .photo-card .photo-date {
      position: absolute;
      bottom: 12px;
      left: 0;
      right: 0;
      text-align: center;
      font-family: 'Caveat', cursive;
      font-size: 1.05rem;
      color: var(--brown-light);
    }

    .photo-card .photo-desc {
      position: absolute;
      bottom: 35px;
      left: 0;
      right: 0;
      text-align: center;
      font-family: 'Caveat', cursive;
      font-size: 0.9rem;
      color: var(--amber);
      font-style: italic;
    }

    /* 照片操作按钮 */
    .photo-actions {
      position: absolute;
      top: 8px;
      right: 8px;
      display: flex;
      gap: 6px;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .photo-card:hover .photo-actions {
      opacity: 1;
    }

    .photo-action-btn {
      padding: 5px 10px;
      border-radius: 2px;
      border: none;
      font-size: 0.7rem;
      cursor: pointer;
      font-family: 'Noto Serif SC', serif;
      transition: all 0.2s;
    }

    .btn-edit {
      background: var(--warm-white);
      color: var(--brown);
    }

    .btn-delete {
      background: rgba(180, 80, 60, 0.9);
      color: white;
    }

    .photo-action-btn:hover {
      transform: scale(1.05);
    }

    /* 菜单按钮 */
    .photo-menu-btn {
      position: absolute;
      top: 8px;
      left: 8px;
      width: 26px;
      height: 26px;
      background: var(--warm-white);
      border-radius: 2px;
      display: none;
      justify-content: center;
      align-items: center;
      font-size: 14px;
      cursor: pointer;
      z-index: 5;
      box-shadow: 0 2px 6px var(--shadow);
    }

    .photo-card:hover .photo-menu-btn,
    .photo-menu-btn.active {
      display: flex;
    }

    .photo-menu {
      display: none;
      position: absolute;
      top: 36px;
      left: 8px;
      background: var(--warm-white);
      border-radius: 2px;
      box-shadow: 0 4px 15px var(--shadow-dark);
      z-index: 10;
      overflow: hidden;
    }

    .photo-menu.show {
      display: block;
    }

    .photo-menu button {
      display: block;
      width: 100%;
      padding: 10px 18px;
      border: none;
      background: var(--warm-white);
      font-size: 13px;
      cursor: pointer;
      text-align: left;
      font-family: 'Noto Serif SC', serif;
    }

    .photo-menu button:hover {
      background: var(--cream);
    }

    /* 上传区域 */
    .upload-zone {
      max-width: 480px;
      margin: 60px auto;
      padding: 50px;
      background: var(--warm-white);
      border-radius: 2px;
      border: 2px dashed var(--sepia);
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 8px 25px var(--shadow);
    }

    .upload-zone:hover {
      border-color: var(--amber);
      background: #fff;
      transform: translateY(-4px);
    }

    .upload-zone.dragover {
      border-color: var(--amber);
      background: #fff;
      transform: scale(1.02);
    }

    .upload-zone input {
      display: none;
    }

    .upload-icon {
      font-size: 40px;
      margin-bottom: 14px;
      opacity: 0.6;
    }

    .upload-zone p {
      color: var(--brown-light);
      font-size: 0.95rem;
    }

    /* 编辑弹窗 */
    .edit-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(92, 74, 61, 0.6);
      z-index: 2000;
      justify-content: center;
      align-items: center;
    }

    .edit-modal.active {
      display: flex;
    }

    .edit-modal-content {
      background: var(--warm-white);
      padding: 35px;
      border-radius: 2px;
      width: 90%;
      max-width: 380px;
      box-shadow: 0 25px 60px var(--shadow-dark);
    }

    .edit-modal h3 {
      font-family: 'Playfair Display', serif;
      font-weight: 500;
      color: var(--brown);
      margin-bottom: 24px;
      text-align: center;
      letter-spacing: 2px;
    }

    .edit-modal input,
    .edit-modal textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--sepia);
      border-radius: 2px;
      font-size: 0.95rem;
      margin-bottom: 16px;
      font-family: 'Noto Serif SC', serif;
      background: var(--cream);
      color: var(--brown);
    }

    .edit-modal input:focus,
    .edit-modal textarea:focus {
      outline: none;
      border-color: var(--amber);
    }

    .edit-modal textarea {
      height: 80px;
      resize: none;
    }

    .edit-modal-btns {
      display: flex;
      gap: 12px;
    }

    .edit-modal-btns button {
      flex: 1;
      padding: 12px;
      border-radius: 2px;
      border: none;
      font-size: 0.95rem;
      cursor: pointer;
      font-family: 'Noto Serif SC', serif;
      transition: all 0.2s;
    }

    .btn-save {
      background: var(--amber);
      color: white;
    }

    .btn-cancel {
      background: var(--sepia);
      color: var(--brown);
    }

    .edit-modal-btns button:hover {
      transform: scale(1.02);
    }

    /* 灯箱 - 电影幕布风格 */
    .lightbox {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(20, 18, 15, 0.97);
      z-index: 1000;
      justify-content: center;
      align-items: center;
      opacity: 0;
      transition: opacity 0.5s;
    }

    .lightbox.active {
      display: flex;
      opacity: 1;
    }

    .lightbox-content {
      position: relative;
      max-width: 90%;
      max-height: 90vh;
    }

    /* 幕布光晕效果 */
    .lightbox::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center, rgba(201, 165, 106, 0.08) 0%, transparent 60%);
      pointer-events: none;
    }

    .lightbox img {
      max-width: 100%;
      max-height: 80vh;
      border-radius: 2px;
      box-shadow: 0 30px 80px rgba(0,0,0,0.5);
      animation: curtainIn 0.6s ease;
    }

    @keyframes curtainIn {
      from {
        opacity: 0;
        transform: scale(0.92) translateY(20px);
        filter: blur(8px);
      }
      to {
        opacity: 1;
        transform: scale(1) translateY(0);
        filter: blur(0);
      }
    }

    .lightbox-close {
      position: absolute;
      top: 30px;
      right: 40px;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--brown);
      border: none;
      font-size: 28px;
      cursor: pointer;
      color: var(--cream);
      transition: all 0.3s;
      z-index: 1001;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .lightbox-close:hover {
      background: var(--amber);
      transform: rotate(90deg);
    }

    .lightbox-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 55px;
      height: 55px;
      border-radius: 50%;
      background: var(--brown);
      border: none;
      font-size: 32px;
      cursor: pointer;
      color: var(--cream);
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .lightbox-nav:hover {
      background: var(--amber);
      transform: translateY(-50%) scale(1.1);
    }

    .lightbox-prev { left: 30px; }
    .lightbox-next { right: 30px; }

    .lightbox-counter {
      position: absolute;
      bottom: -45px;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Caveat', cursive;
      font-size: 1.2rem;
      color: var(--amber-light);
      letter-spacing: 2px;
    }

    /* 响应式 */
    @media (max-width: 768px) {
      .film-strip { display: none; }
      .header h1 { font-size: 2.2rem; letter-spacing: 3px; }
      .header::before, .header::after { display: none; }
      .carousel { height: 340px; }
      .carousel-item { width: 220px; height: 300px; margin-left: -110px; margin-top: -150px; padding: 10px 10px 40px 10px; }
      .carousel-item.prev { transform: scale(0.7) translateX(-120px) translateZ(-200px) rotateY(10deg); }
      .carousel-item.next { transform: scale(0.7) translateX(120px) translateZ(-200px) rotateY(-10deg); }
      .photo-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 25px; }
      .photo-card { padding: 10px 10px 40px 10px; }
      .lightbox-nav { width: 44px; height: 44px; font-size: 24px; }
      .lightbox-prev { left: 10px; }
      .lightbox-next { right: 10px; }
      .music-control { width: 56px; height: 56px; bottom: 20px; right: 20px; }
      .vinyl { width: 40px; height: 40px; }
    }
  </style>
</head>
<body>
  <!-- 胶片孔洞装饰 -->
  <div class="film-strip left">
    <div class="film-hole"></div><div class="film-hole"></div><div class="film-hole"></div>
    <div class="film-hole"></div><div class="film-hole"></div><div class="film-hole"></div>
    <div class="film-hole"></div><div class="film-hole"></div><div class="film-hole"></div>
    <div class="film-hole"></div><div class="film-hole"></div><div class="film-hole"></div>
    <div class="film-hole"></div><div class="film-hole"></div><div class="film-hole"></div>
  </div>
  <div class="film-strip right">
    <div class="film-hole"></div><div class="film-hole"></div><div class="film-hole"></div>
    <div class="film-hole"></div><div class="film-hole"></div><div class="film-hole"></div>
    <div class="film-hole"></div><div class="film-hole"></div><div class="film-hole"></div>
    <div class="film-hole"></div><div class="film-hole"></div><div class="film-hole"></div>
    <div class="film-hole"></div><div class="film-hole"></div><div class="film-hole"></div>
  </div>

  <!-- 漏光效果 -->
  <div class="light-leak"></div>
  <div class="light-leak-2"></div>

  <!-- 唱片机音乐控制 -->
  <div class="music-control" id="musicControl" title="点击播放/暂停">
    <div class="vinyl">
      <div class="music-label"></div>
    </div>
  </div>
  <audio id="bgMusic" loop>
    <source src="bgm.mp3" type="audio/mpeg">
  </audio>

  <div class="container">
    <div class="header">
      <h1>Our Photo Wall</h1>
      <p>Every moment deserves to be cherished</p>
    </div>

    <!-- 轮播区域 -->
    <div class="carousel-section">
      <div class="section-label">— Featured —</div>
      <div class="carousel" id="carousel">
        <div class="carousel-track" id="carouselTrack"></div>
        <button class="lightbox-nav carousel-nav prev-nav" id="carouselPrev" style="left: 10px;">‹</button>
        <button class="lightbox-nav carousel-nav next-nav" id="carouselNext" style="right: 10px;">›</button>
      </div>
      <div class="carousel-dots" id="carouselDots"></div>
    </div>

    <!-- 照片网格 -->
    <div class="photo-section">
      <h2>All Photos</h2>
      <div class="sort-control">
        <button class="sort-btn active" data-sort="date-desc">最新</button>
        <button class="sort-btn" data-sort="date-asc">最早</button>
        <button class="sort-btn" data-sort="name">按描述</button>
        <button class="sort-btn add-btn" onclick="document.getElementById('fileInput').click()">+ 添加照片</button>
      </div>
      <div class="photo-grid" id="photoGrid"></div>
    </div>

    <!-- 上传区域 -->
    <div class="upload-zone" id="uploadZone" style="display:none;">
      <div class="upload-icon">+</div>
      <p>点击或拖拽添加新照片</p>
      <input type="file" id="fileInput" accept="image/*" multiple>
    </div>
  </div>

  <!-- 编辑弹窗 -->
  <div class="edit-modal" id="editModal">
    <div class="edit-modal-content">
      <h3>Edit Photo</h3>
      <input type="date" id="editDate">
      <textarea id="editDesc" placeholder="添加描述..."></textarea>
      <div class="edit-modal-btns">
        <button class="btn-cancel" id="editCancel">取消</button>
        <button class="btn-save" id="editSave">保存</button>
      </div>
    </div>
  </div>

  <!-- 灯箱 -->
  <div class="lightbox" id="lightbox">
    <button class="lightbox-close" id="lightboxClose">×</button>
    <button class="lightbox-nav lightbox-prev" id="lightboxPrev">‹</button>
    <button class="lightbox-nav lightbox-next" id="lightboxNext">›</button>
    <div class="lightbox-content">
      <img src="" alt="" id="lightboxImg">
      <div class="lightbox-counter" id="lightboxCounter"></div>
    </div>
  </div>

  <script>
    // JSONBin 配置
    const JSONBIN_CONFIG = {
      binId: '69c56056b7ec241ddca7a176',
      masterKey: '$2a$10$.M9c.UOXWhNcQj83z9lMf.TiI0GJnuQ.1Qa76Y7bnXLiJz8uTQU1G',
      apiUrl: 'https://api.jsonbin.io/v3/b/'
    };

    // 默认照片列表
    const defaultPhotos = [
      { src: 'http://mmxzyx-picture.oss-cn-beijing.aliyuncs.com/photos/1774539152590_1a188e81e3095136782caace22dcdbac.jpg', date: '2026-03', description: '' },
      { src: 'http://mmxzyx-picture.oss-cn-beijing.aliyuncs.com/photos/1774539152739_7634c9b8c05fbeb98858d411b1444624.jpg', date: '2026-03', description: '' },
      { src: 'http://mmxzyx-picture.oss-cn-beijing.aliyuncs.com/photos/1774539152828_9cdd0a7c1925d4227b521f80a9305069.jpg', date: '2026-03', description: '' },
      { src: 'http://mmxzyx-picture.oss-cn-beijing.aliyuncs.com/photos/1774539152917_a67e905505a67e29802f60ad46da39ef.jpg', date: '2026-03', description: '' },
      { src: 'http://mmxzyx-picture.oss-cn-beijing.aliyuncs.com/photos/1774539152962_db4bcfc3310f3460764bee308069fe72.jpg', date: '2026-03', description: '' },
      { src: 'http://mmxzyx-picture.oss-cn-beijing.aliyuncs.com/photos/1774539153001_e3c25d728f88a6d77f669534853e4190.jpg', date: '2026-03', description: '' }
    ];

    let photos = [];
    let currentIndex = 0;
    let autoPlayTimer;
    let currentSort = 'date-desc';
    let editingIndex = null;

    // 从 JSONBin 读取照片列表
    async function loadPhotos() {
      try {
        const res = await fetch(`${JSONBIN_CONFIG.apiUrl}${JSONBIN_CONFIG.binId}/latest`, {
          headers: {
            'X-Master-Key': JSONBIN_CONFIG.masterKey
          }
        });
        const data = await res.json();
        if (data.record && data.record.photos && data.record.photos.length > 0) {
          return data.record.photos;
        }
      } catch (err) {
        console.log('从JSONBin读取失败，使用默认列表');
      }
      return defaultPhotos;
    }

    // 保存照片列表到 JSONBin
    async function savePhotos() {
      try {
        await fetch(`${JSONBIN_CONFIG.apiUrl}${JSONBIN_CONFIG.binId}`, {
          method: 'PUT',
          headers: {
            'Content-Type': 'application/json',
            'X-Master-Key': JSONBIN_CONFIG.masterKey
          },
          body: JSON.stringify({ photos: photos })
        });
      } catch (err) {
        console.error('保存到JSONBin失败:', err);
      }
    }

    // DOM
    const carouselTrack = document.getElementById('carouselTrack');
    const carouselDots = document.getElementById('carouselDots');
    const photoGrid = document.getElementById('photoGrid');
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightboxImg');
    const lightboxCounter = document.getElementById('lightboxCounter');

    // 背景音乐控制
    const musicControl = document.getElementById('musicControl');
    const bgMusic = document.getElementById('bgMusic');
    let isPlaying = false;

    musicControl.addEventListener('click', () => {
      if (isPlaying) {
        bgMusic.pause();
        musicControl.classList.remove('playing');
      } else {
        bgMusic.play().catch(() => {
          console.log('需要用户交互才能播放音乐');
        });
        musicControl.classList.add('playing');
      }
      isPlaying = !isPlaying;
    });

    // 初始化
    async function init() {
      // 从 JSONBin 加载照片
      const loadedPhotos = await loadPhotos();
      loadedPhotos.forEach((file, i) => {
        photos.push({ ...file, id: Date.now() + i });
      });
      sortPhotos();
      renderCarousel();
      renderGrid();
      startAutoPlay();
      initSortButtons();
      initEditModal();
    }

    // 排序功能
    function sortPhotos() {
      switch (currentSort) {
        case 'date-desc':
          photos.sort((a, b) => new Date(b.date) - new Date(a.date));
          break;
        case 'date-asc':
          photos.sort((a, b) => new Date(a.date) - new Date(b.date));
          break;
        case 'name':
          photos.sort((a, b) => (a.description || '').localeCompare(b.description || ''));
          break;
      }
    }

    function initSortButtons() {
      document.querySelectorAll('.sort-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          currentSort = btn.dataset.sort;
          sortPhotos();
          renderGrid();
        });
      });
    }

    // 编辑弹窗功能
    function initEditModal() {
      const modal = document.getElementById('editModal');
      const editDate = document.getElementById('editDate');
      const editDesc = document.getElementById('editDesc');

      document.getElementById('editCancel').addEventListener('click', () => {
        modal.classList.remove('active');
      });

      document.getElementById('editSave').addEventListener('click', async () => {
        if (editingIndex !== null) {
          photos[editingIndex].date = editDate.value || '2026-03';
          photos[editingIndex].description = editDesc.value;
          modal.classList.remove('active');
          await savePhotos(); // 同步到 JSONBin
          renderGrid();
          // 如果当前在编辑的照片也在轮播里，更新轮播
          updateCarouselPhoto(editingIndex);
        }
      });

      modal.addEventListener('click', (e) => {
        if (e.target === modal) {
          modal.classList.remove('active');
        }
      });
    }

    function openEditModal(index) {
      editingIndex = index;
      const photo = photos[index];
      document.getElementById('editDate').value = photo.date;
      document.getElementById('editDesc').value = photo.description || '';
      document.getElementById('editModal').classList.add('active');
    }

    // 手机端菜单切换
    function togglePhotoMenu(btn) {
      // 关闭其他菜单
      document.querySelectorAll('.photo-menu.show').forEach(m => m.classList.remove('show'));
      document.querySelectorAll('.photo-menu-btn.active').forEach(b => b.classList.remove('active'));

      // 切换当前菜单
      const menu = btn.nextElementSibling;
      menu.classList.toggle('show');
      btn.classList.toggle('active');
    }

    // 点击其他地方关闭菜单
    document.addEventListener('click', (e) => {
      if (!e.target.closest('.photo-menu-btn') && !e.target.closest('.photo-menu')) {
        document.querySelectorAll('.photo-menu.show').forEach(m => m.classList.remove('show'));
        document.querySelectorAll('.photo-menu-btn.active').forEach(b => b.classList.remove('active'));
      }
    });

    async function deletePhoto(index) {
      if (confirm('确定要删除这张照片吗？')) {
        photos.splice(index, 1);
        await savePhotos(); // 同步到 JSONBin
        renderCarousel();
        renderGrid();
      }
    }

    function updateCarouselPhoto(index) {
      const items = document.querySelectorAll('.carousel-item');
      if (items[index]) {
        const photo = photos[index];
        const dateStr = photo.date ? formatDate(photo.date) : '';
        items[index].innerHTML = `<img src="${photo.src}" alt="照片">
          ${dateStr ? `<div class="slide-date">${dateStr}</div>` : ''}`;
      }
    }

    // 渲染轮播
    function renderCarousel() {
      carouselTrack.innerHTML = '';
      carouselDots.innerHTML = '';

      photos.forEach((photo, index) => {
        // 轮播项
        const item = document.createElement('div');
        item.className = 'carousel-item';
        item.dataset.index = index;

        const dateStr = formatDate(photo.date);
        const dateHtml = dateStr ? `<div class="slide-date">${dateStr}</div>` : '';

        item.innerHTML = `<img src="${photo.src}" alt="照片">${dateHtml}`;
        item.addEventListener('click', () => openLightbox(index));
        carouselTrack.appendChild(item);

        // 指示点
        const dot = document.createElement('div');
        dot.className = 'carousel-dot' + (index === 0 ? ' active' : '');
        dot.addEventListener('click', () => goToSlide(index));
        carouselDots.appendChild(dot);
      });

      updateCarousel(0);
    }

    // 更新轮播状态
    function updateCarousel(index) {
      const items = document.querySelectorAll('.carousel-item');
      const dots = document.querySelectorAll('.carousel-dot');

      items.forEach((item, i) => {
        item.classList.remove('active', 'prev', 'next');
        if (i === index) item.classList.add('active');
        else if (i === (index - 1 + photos.length) % photos.length) item.classList.add('prev');
        else if (i === (index + 1) % photos.length) item.classList.add('next');
      });

      dots.forEach((dot, i) => {
        dot.classList.toggle('active', i === index);
      });

      currentIndex = index;
    }

    function goToSlide(index) {
      updateCarousel(index);
      resetAutoPlay();
    }

    function nextSlide() {
      updateCarousel((currentIndex + 1) % photos.length);
    }

    function prevSlide() {
      updateCarousel((currentIndex - 1 + photos.length) % photos.length);
    }

    function startAutoPlay() {
      autoPlayTimer = setInterval(nextSlide, 3000);
    }

    function resetAutoPlay() {
      clearInterval(autoPlayTimer);
      startAutoPlay();
    }

    // 格式化日期显示
    function formatDate(dateStr) {
      if (!dateStr) return '';
      const parts = dateStr.split('-');
      if (parts.length >= 2) {
        return `${parts[0]}年${parseInt(parts[1])}月`;
      }
      return dateStr;
    }

    // 渲染网格
    function renderGrid() {
      photoGrid.innerHTML = '';
      photos.forEach((photo, index) => {
        const card = document.createElement('div');
        card.className = 'photo-card';
        card.style.animationDelay = `${index * 0.15}s`;

        const dateStr = formatDate(photo.date);
        const descHtml = photo.description ? `<div class="photo-desc">${photo.description}</div>` : '';

        card.innerHTML = `
          <img src="${photo.src}" alt="照片">
          ${descHtml}
          <div class="photo-date">${dateStr}</div>
          <div class="photo-actions">
            <button class="photo-action-btn btn-edit" onclick="event.stopPropagation();openEditModal(${index})">编辑</button>
            <button class="photo-action-btn btn-delete" onclick="event.stopPropagation();deletePhoto(${index})">删除</button>
          </div>
          <div class="photo-menu-btn" onclick="event.stopPropagation();togglePhotoMenu(this)">⋮</div>
          <div class="photo-menu" onclick="event.stopPropagation()">
            <button onclick="openEditModal(${index})">编辑</button>
            <button onclick="deletePhoto(${index})">删除</button>
          </div>
        `;
        card.addEventListener('click', (e) => {
          if (e.target.closest('.photo-menu-btn') || e.target.closest('.photo-menu')) return;
          openLightbox(index);
        });
        photoGrid.appendChild(card);
      });
    }

    // 灯箱
    function openLightbox(index) {
      lightboxImg.src = photos[index].src;
      lightbox.classList.add('active');
      updateLightboxCounter(index);
      document.body.style.overflow = 'hidden';
      clearInterval(autoPlayTimer);
    }

    function closeLightbox() {
      lightbox.classList.remove('active');
      document.body.style.overflow = '';
      startAutoPlay();
    }

    function lightboxPrev() {
      const idx = (currentIndex - 1 + photos.length) % photos.length;
      lightboxImg.src = photos[idx].src;
      updateLightboxCounter(idx);
    }

    function lightboxNext() {
      const idx = (currentIndex + 1) % photos.length;
      lightboxImg.src = photos[idx].src;
      updateLightboxCounter(idx);
    }

    function updateLightboxCounter(index) {
      lightboxCounter.textContent = `${index + 1} / ${photos.length}`;
    }

    // 事件绑定
    document.getElementById('carouselPrev').addEventListener('click', () => { prevSlide(); resetAutoPlay(); });
    document.getElementById('carouselNext').addEventListener('click', () => { nextSlide(); resetAutoPlay(); });
    document.getElementById('lightboxClose').addEventListener('click', closeLightbox);
    document.getElementById('lightboxPrev').addEventListener('click', lightboxPrev);
    document.getElementById('lightboxNext').addEventListener('click', lightboxNext);
    lightbox.addEventListener('click', (e) => { if (e.target === lightbox) closeLightbox(); });

    document.addEventListener('keydown', (e) => {
      if (!lightbox.classList.contains('active')) return;
      if (e.key === 'Escape') closeLightbox();
      if (e.key === 'ArrowLeft') lightboxPrev();
      if (e.key === 'ArrowRight') lightboxNext();
    });

    // 上传
    const uploadZone = document.getElementById('uploadZone');
    const fileInput = document.getElementById('fileInput');

    uploadZone.addEventListener('click', () => fileInput.click());
    uploadZone.addEventListener('dragover', (e) => { e.preventDefault(); uploadZone.classList.add('dragover'); });
    uploadZone.addEventListener('dragleave', () => { uploadZone.classList.remove('dragover'); });
    uploadZone.addEventListener('drop', (e) => {
      e.preventDefault();
      uploadZone.classList.remove('dragover');
      handleFiles(e.dataTransfer.files);
    });
    fileInput.addEventListener('change', (e) => handleFiles(e.target.files));

    // 阿里云 OSS 配置（公共读写Bucket）
    const OSS_CONFIG = {
      host: 'https://mmxzyx-picture.oss-cn-beijing.aliyuncs.com'
    };

    // 上传状态提示
    function showUploadStatus(status) {
      let statusEl = document.getElementById('uploadStatus');
      if (!statusEl) {
        statusEl = document.createElement('div');
        statusEl.id = 'uploadStatus';
        statusEl.style.cssText = `
          position: fixed;
          top: 20px;
          left: 50%;
          transform: translateX(-50%);
          background: linear-gradient(135deg, #ff6b9d, #ffa07a);
          color: white;
          padding: 12px 24px;
          border-radius: 30px;
          font-size: 14px;
          z-index: 2000;
          opacity: 0;
          transition: opacity 0.3s;
        `;
        document.body.appendChild(statusEl);
      }
      statusEl.textContent = status;
      statusEl.style.opacity = '1';
      setTimeout(() => { statusEl.style.opacity = '0'; }, 2000);
    }

    // 压缩图片（最大宽度1920px，质量0.8）
    async function compressImage(file, maxWidth = 1920, quality = 0.8) {
      return new Promise((resolve) => {
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement('canvas');
          let { width, height } = img;
          if (width > maxWidth) {
            height = (height * maxWidth) / width;
            width = maxWidth;
          }
          canvas.width = width;
          canvas.height = height;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, width, height);
          canvas.toBlob(resolve, 'image/jpeg', quality);
        };
        img.src = URL.createObjectURL(file);
      });
    }

    // 上传文件到阿里云 OSS（自动压缩）
    async function uploadToOSS(file) {
      // 压缩后再上传
      const compressedFile = await compressImage(file);

      const filename = `photos/${Date.now()}_${file.name}`;
      const url = `${OSS_CONFIG.host}/${filename}`;

      const res = await fetch(url, {
        method: 'PUT',
        body: compressedFile,
        headers: {
          'Content-Type': 'image/jpeg'
        }
      });

      if (!res.ok) {
        throw new Error('上传失败');
      }

      return url;
    }

    // 从文件提取 EXIF 日期
    function extractExifDate(file) {
      return new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = function(e) {
          try {
            const view = new DataView(e.target.result);
            // 检查 EXIF 标记
            if (view.getUint16(0, false) !== 0xFFD8) {
              resolve('2026-03'); // 不是 JPEG
              return;
            }

            const length = view.byteLength;
            let offset = 2;
            while (offset < length) {
              if (view.getUint16(offset, false) === 0xFFE1) {
                // EXIF 标记
                const exifData = e.target.result.slice(offset + 4);
                const exifStr = new TextDecoder('utf-8').decode(exifData);
                const dateMatch = exifStr.match(/(\d{4}):(\d{2}):(\d{2})/);
                if (dateMatch) {
                  resolve(`${dateMatch[1]}-${dateMatch[2]}-${dateMatch[3]}`);
                  return;
                }
              }
              offset += 2 + view.getUint16(offset + 2, false);
            }
          } catch (err) {}
          resolve('2026-03'); // 默认日期
        };
        reader.onerror = () => resolve('2026-03');
        reader.readAsArrayBuffer(file.slice(0, 65536)); // 只读头部
      });
    }

    async function handleFiles(files) {
      const imageFiles = Array.from(files).filter(f => f.type.startsWith('image/'));

      for (const file of imageFiles) {
        try {
          showUploadStatus('上传中... ' + file.name);

          // 提取 EXIF 日期
          const exifDate = await extractExifDate(file);

          const ossUrl = await uploadToOSS(file);
          const newPhoto = { src: ossUrl, date: exifDate, description: '', id: Date.now() };
          photos.push(newPhoto);
          sortPhotos();
          showUploadStatus('上传成功 ✓');

          // 保存到 JSONBin
          await savePhotos();

          renderCarousel();
          renderGrid();
        } catch (err) {
          console.error('上传失败:', err);
          showUploadStatus('上传失败 ✗');

          // 降级：使用本地预览
          const reader = new FileReader();
          reader.onload = (e) => {
            photos.push({ src: e.target.result, date: '2026-03', description: '', id: Date.now() });
            sortPhotos();
            renderCarousel();
            renderGrid();
          };
          reader.readAsDataURL(file);
        }
      }
    }

    init();
  </script>
</body>
</html>
